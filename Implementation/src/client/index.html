<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncSpace - Collaborative Editor</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "yjs": "https://esm.sh/yjs@13.6.14",
        "y-protocols/awareness": "https://esm.sh/y-protocols@1.0.6/awareness",
        "y-codemirror.next": "https://esm.sh/y-codemirror.next@0.3.5?deps=yjs@13.6.14,y-protocols@1.0.6",
        "@codemirror/state": "https://esm.sh/@codemirror/state",
        "codemirror": "https://esm.sh/codemirror",
        "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python",
        "@codemirror/lang-java": "https://esm.sh/@codemirror/lang-java",
        "@codemirror/lang-cpp": "https://esm.sh/@codemirror/lang-cpp",
        "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark"
      }
    }
  </script>
</head>
<body>

  <header class="top-bar">
    <div class="brand">
      <div class="brand-icon"></div>
      SyncSpace
    </div>
    <div class="session-info">
      <div class="status-indicator">
        <div id="connection-dot" class="dot"></div>
        <span id="connection-status">Connecting...</span>
      </div>
      <button class="share-btn" id="share-btn">Share Link</button>
    </div>
  </header>

  <main class="main-container">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h3>Your name</h3>
        <input type="text" id="display-name" class="text-input" maxlength="40" placeholder="Display name" autocomplete="nickname" />
      </div>
      <div class="sidebar-section">
        <h3>Files</h3>
        <button type="button" id="add-file-btn" class="mini-btn">+ Add file</button>
        <div id="file-list" class="file-list-wrap"></div>
        <p class="hint">Paths can include folders (<code>src/main.c</code>). Shared for everyone in this session.</p>
      </div>
      <div class="sidebar-section">
        <h3>Syntax</h3>
        <select id="language-select" class="select-input" aria-label="Syntax highlighting language">
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="c">C</option>
        </select>
      </div>
      <div class="sidebar-section">
        <h3>Cursors</h3>
        <label class="toggle-row">
          <input type="checkbox" id="show-cursor-names" />
          <span class="toggle-label">Show collaborator name above cursor</span>
        </label>
      </div>
      <div class="sidebar-section">
        <h3>Participants</h3>
        <div id="participants-list" class="participants-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </aside>

    <div class="editor-wrapper" id="editor">
      <!-- CodeMirror instance will be mounted here -->
    </div>
  </main>

  <div id="toast">Copied to clipboard!</div>

  <script type="module" src="app.js"></script>
</body>
</html>
